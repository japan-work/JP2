<!DOCTYPE html>

<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayur </title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600&amp;display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Noto Sans JP',sans-serif;
  background:#f2eeea;
  color:#222;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
}
nav a{
  margin-left:20px;
  text-decoration:none;
  color:#444;
}

/* HERO */
.hero{
  width:92%;
  margin:20px auto;
  height:500px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.2));
}
.hero-text{
  position:absolute;
  bottom:60px;
  left:60px;
  color:white;
}
.hero-text h1{
  font-size:40px;
}

/* SECTION */
.section{
  padding:80px 60px;
}

/* PRODUCTS */
.products{
  display:flex;
  gap:30px;
  justify-content:center;
}
.product{
  background:white;
  width:260px;
  border-radius:15px;
  overflow:hidden;
}
.product img{
  width:100%;
  height:300px;
  object-fit:cover;
}
.product div{
  padding:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
}

/* FEATURE */
.feature{
  display:flex;
  gap:40px;
  align-items:center;
}
.feature img{
  width:400px;
  border-radius:15px;
}

/* LAYER */
.layer{
  display:flex;
  gap:40px;
  align-items:center;
}
.layer img{
  width:200px;
  border-radius:15px;
}

/* FULL IMAGE */
.full img{
  width:100%;
  height:400px;
  object-fit:cover;
}

/* CTA */
.cta{
  background:#b76a73;
  color:white;
  padding:60px;
  display:flex;
  justify-content:space-between;
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:40px;
}

/* MOBILE */
@media(max-width:900px){
  .products,.feature,.layer,.cta{
    flex-direction:column;
    align-items:center;
  }
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h2>Mayur </h2>
  <nav>
    <a>ホーム</a>
    <a>ショップ</a>
    <a>コレクション</a>
  </nav>
</header>
<!-- HERO -->
<section class="hero">
  <img src="https://images.unsplash.com/photo-1610030469983-98e550d6193c">
  <div class="overlay"></div>
  <div class="hero-text">
    <h1>春の光のように、まとう。</h1>
  </div>
</section>

<!-- PRODUCTS -->
<section class="section">
  <h2>人気商品</h2>
  <div class="products">
    
    <div class="product">
      <img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
      <div>シルクサリー ¥22,800</div>
    </div>
   
  </div>
</section>

<!-- FEATURE -->
<section class="section feature">
  <img src="https://images.unsplash.com/photo-1603252109303-2751441dd157">
  <div>
    <h2>伝統とモダンの融合</h2>
    <p>サリーの美しさを現代へ。</p>
  </div>
</section>

<!-- CATEGORY -->
<section class="section">
  <h2>カテゴリー</h2>
  <div class="grid">
    <div class="card">サリー</div>
    <div class="card">ドレス</div>
    <div class="card">アクセサリー</div>
    <div class="card">バッグ</div>
    <div class="card">トップス</div>
    <div class="card">伝統衣装</div>
  </div>
</section>

<!-- LAYER -->
<section class="section layer">
  <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
  <img src="https://images.unsplash.com/photo-1622290291468-a28f7a7dc6a8">
  <div>
    <h2>Layered light</h2>
    <p>柔らかな光と素材の重なり。</p>
  </div>
</section>

<!-- FULL IMAGE -->
<section class="full">
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
</section>

<!-- MORE PRODUCTS -->
<section class="section">
  <h2>新着商品</h2>
  <div class="products">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
      <div>ピンクサリー</div>
    </div>
    <div class="product">
      <img src="https://images.unsplash.com/photo-1622290291468-a28f7a7dc6a8">
      <div>ゴールドサリー</div>
    </div>
    
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <h2>コンシェルジュに相談</h2>
  <button style="padding:10px 20px;border:none;border-radius:20px;">問い合わせ</button>
</section>

<footer>
  © Mayur 
</footer>


</body></html>
